<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caza Pokemons</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="https://img.icons8.com/color/48/pokeball--v1.png" alt="Pokeball">
            <h1>PokéDex</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html" >Inici</a></li>
                <li><a href="my_pokemons.html">Els meus Pokémon</a></li>
                <li><a href="hunt.html" class="active">Caça</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="imgHunt">
        

        <div id="enemy">
            <img src="" alt="Pokemon Salvaje" id="pkmnSalvaje">
            <div class="enemylife">
            <h3 id="enemy-name">???</h3>
                <h3 id="hp-enemy">Vida del oponente.</h3>
            </div>
        </div>

        <div id="player">
            <img src="" alt="Pokemon del jugador" id="pkmn-player">
            <div class="playerlife">
                <h3 id="player-name">Tu Pokémon</h3>
                <h3 id="hp-player">Vida del jugador.</h3>
            </div>
        </div>

        <div class="battle-actions">
            <button id="btn-attack" class="botones">Atacar</button>
            <button id="btn-catch" class="botones">Capturar</button>
            <button id="btn-run" class="botones">Huir</button>
        </div>
    </div>

    </main>
    <script type="module" src="js/battle.js"></script>
